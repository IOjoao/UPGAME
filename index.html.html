<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🦖 DINO GAME MULTIPLAYER - 2 JOGADORES!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .modo-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .modo-btn {
            padding: 8px 20px;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.5);
            border: 2px solid #FFD700;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modo-btn.active {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            border-color: white;
        }

        .players-panel {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 15px;
        }

        .player-card {
            flex: 1;
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            padding: 10px;
            border: 2px solid;
        }

        .player1-card {
            border-color: #FF6B6B;
        }

        .player2-card {
            border-color: #4ECDC4;
        }

        .player-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .player-score {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .player-controls {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 5px;
        }

        .vs-badge {
            font-size: 1.5rem;
            font-weight: bold;
            color: #FFD700;
            display: flex;
            align-items: center;
        }

        .fase-info {
            font-size: 1rem;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .fase-badge {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            padding: 5px 20px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
        }

        .winner-announce {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 5px 15px;
            border-radius: 25px;
            color: #1a1a2e;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .instrucao {
            color: #ccc;
            margin-bottom: 15px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
        }

        canvas {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }

        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 20px 0 20px;
            padding: 10px 25px;
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
        }

        .info-item {
            font-size: 1rem;
            color: #FFD700;
        }

        button {
            margin-top: 15px;
            padding: 10px 25px;
            font-size: 0.9rem;
            font-weight: bold;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
        }

        @media (max-width: 900px) {
            canvas { width: 95vw; height: auto; }
            .players-panel { flex-direction: column; }
            .vs-badge { display: none; }
            .player-card { margin-bottom: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦖 DINO GAME - MULTIPLAYER! 👥</h1>
        
        <div class="modo-selector">
            <div class="modo-btn active" data-modo="single">🎮 SINGLE PLAYER</div>
            <div class="modo-btn" data-modo="multi">👥 MULTIPLAYER (2 JOGADORES)</div>
        </div>
        
        <div class="players-panel" id="playersPanel">
            <div class="player-card player1-card">
                <div class="player-name">🟥 JOGADOR 1</div>
                <div class="player-score" id="score1">0</div>
                <div class="player-controls">⬆️ ESPAÇO para pular</div>
            </div>
            <div class="vs-badge">⚔️ VS ⚔️</div>
            <div class="player-card player2-card" id="player2Card" style="display: none;">
                <div class="player-name">🔵 JOGADOR 2</div>
                <div class="player-score" id="score2">0</div>
                <div class="player-controls">🖱️ CLIQUE na tela para pular</div>
            </div>
        </div>
        
        <div class="fase-info">
            <div class="fase-badge" id="faseNome">🌵 FASE 1: CACTOS</div>
            <div class="fase-badge" id="winnerDisplay"></div>
        </div>
        
        <p class="instrucao" id="instrucaoJogo">⬆️ ESPAÇO para pular</p>
        
        <canvas id="gameCanvas" width="900" height="450"></canvas>
        
        <div class="info">
            <div class="info-item">🏆 PONTUAÇÃO <span id="scoreTotal">0</span></div>
            <div class="info-item">⭐ FASE <span id="faseNumero">1</span>/20</div>
            <div class="info-item">🏅 RECORDE <span id="record">0</span></div>
        </div>
        
        <button id="reiniciarBtn">🔄 REINICIAR JOGO</button>
    </div>

    <script>
        // ====================================
        // CONFIGURAÇÕES
        // ====================================

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreTotal');
        const recordElement = document.getElementById('record');
        const faseNumeroElement = document.getElementById('faseNumero');
        const faseNomeElement = document.getElementById('faseNome');
        const reiniciarBtn = document.getElementById('reiniciarBtn');
        const score1Element = document.getElementById('score1');
        const score2Element = document.getElementById('score2');
        const player2Card = document.getElementById('player2Card');
        const winnerDisplay = document.getElementById('winnerDisplay');
        const instrucaoJogo = document.getElementById('instrucaoJogo');

        const LARGURA = 900;
        const ALTURA = 450;
        canvas.width = LARGURA;
        canvas.height = ALTURA;

        let modoMultiplayer = false;
        let jogoRodando = true;
        let pontuacao = 0;
        let pontuacao2 = 0;
        let fase = 1;
        let recorde = localStorage.getItem('dinoRecordeMultiplayer') || 0;
        recordElement.textContent = recorde;

        let velocidadeJogo = 5;
        
        // Vencedor
        let vencedor = null;
        
        // ====================================
        // OBSTÁCULOS POR FASE
        // ====================================
        
        const obstaculosPorFase = {
            1: { nome: "🌵 CACTOS", tipo: "cacto", velocidade: 5 },
            2: { nome: "🐦 PÁSSAROS", tipo: "passaro", velocidade: 5.5 },
            3: { nome: "🪨 PEDRAS", tipo: "pedra", velocidade: 6 },
            4: { nome: "🔥 TOCHAS", tipo: "tocha", velocidade: 6.5 },
            5: { nome: "💀 FOGUEIRAS", tipo: "fogueira", velocidade: 7 },
            6: { nome: "🌊 POÇAS", tipo: "poca", velocidade: 7.2 },
            7: { nome: "🧱 MUROS", tipo: "muro", velocidade: 7.5 },
            8: { nome: "⚙️ ENGRENAGENS", tipo: "engrenagem", velocidade: 7.8 },
            9: { nome: "🔮 CRISTAIS", tipo: "cristal", velocidade: 8 },
            10: { nome: "🌿 TREPADEIRAS", tipo: "trepadeira", velocidade: 8.2 },
            11: { nome: "🕳️ BURACOS", tipo: "buraco", velocidade: 8.5 },
            12: { nome: "🗿 ESTÁTUAS", tipo: "estatua", velocidade: 8.7 },
            13: { nome: "⚡ RAIOS", tipo: "raio", velocidade: 9 },
            14: { nome: "❄️ GELO", tipo: "gelo", velocidade: 9.2 },
            15: { nome: "🍄 COGUMELOS", tipo: "cogumelo", velocidade: 9.5 },
            16: { nome: "🦂 ESCORPIÕES", tipo: "escorpiao", velocidade: 9.7 },
            17: { nome: "🧨 BOMBAS", tipo: "bomba", velocidade: 10 },
            18: { nome: "👻 FANTASMAS", tipo: "fantasma", velocidade: 10.2 },
            19: { nome: "🐉 DRAGÃO", tipo: "dragao", velocidade: 10.5 },
            20: { nome: "👑 CHEFE FINAL", tipo: "chefe", velocidade: 11 }
        };

        function atualizarInterfaceFase() {
            faseNumeroElement.textContent = fase;
            faseNomeElement.textContent = `${obstaculosPorFase[fase].nome}`;
            velocidadeJogo = obstaculosPorFase[fase].velocidade;
        }

        // ====================================
        // CLASSE DO DINOSSAURO
        // ====================================

        class Dino {
            constructor(x, cor, corClara, posicao) {
                this.x = x;
                this.y = ALTURA - 85;
                this.largura = 35;
                this.altura = 45;
                this.velY = 0;
                this.pulando = false;
                this.gravidade = 0.8;
                this.forcaPulo = -12;
                this.animacaoPerna = 0;
                this.olhosAbertos = true;
                this.cor = cor;
                this.corClara = corClara;
                this.posicao = posicao; // 1 ou 2
                this.vivo = true;
            }
            
            pular() {
                if (!this.pulando && jogoRodando && this.vivo) {
                    this.velY = this.forcaPulo;
                    this.pulando = true;
                }
            }
            
            atualizar() {
                if (!this.vivo) return;
                
                if (this.pulando) {
                    this.velY += this.gravidade;
                    this.y += this.velY;
                    
                    if (this.y >= ALTURA - 85) {
                        this.y = ALTURA - 85;
                        this.pulando = false;
                        this.velY = 0;
                    }
                }
                
                if (!this.pulando && jogoRodando) {
                    this.animacaoPerna = (this.animacaoPerna + 0.2) % (Math.PI * 2);
                }
                
                if (Math.random() < 0.005) {
                    this.olhosAbertos = false;
                    setTimeout(() => { if(this.olhosAbertos !== undefined) this.olhosAbertos = true; }, 100);
                }
            }
            
            desenhar() {
                if (!this.vivo) return;
                
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 5;
                
                const corpoGrad = ctx.createLinearGradient(this.x, this.y, this.x + this.largura, this.y + this.altura);
                corpoGrad.addColorStop(0, this.cor);
                corpoGrad.addColorStop(1, this.corClara);
                ctx.fillStyle = corpoGrad;
                ctx.fillRect(this.x, this.y, this.largura, this.altura);
                
                ctx.fillStyle = this.corClara;
                ctx.fillRect(this.x + 6, this.y + 15, 12, 22);
                
                const anguloPerna = Math.sin(this.animacaoPerna) * 0.5;
                ctx.fillStyle = '#1b4332';
                
                ctx.save();
                ctx.translate(this.x + 8, this.y + 40);
                ctx.rotate(anguloPerna);
                ctx.fillRect(0, 0, 10, 12);
                ctx.restore();
                
                ctx.save();
                ctx.translate(this.x + 22, this.y + 40);
                ctx.rotate(-anguloPerna);
                ctx.fillRect(0, 0, 10, 12);
                ctx.restore();
                
                ctx.fillStyle = this.cor;
                ctx.fillRect(this.x + 28, this.y + 10, 12, 22);
                ctx.fillRect(this.x + 35, this.y - 2, 24, 24);
                
                if (this.olhosAbertos) {
                    ctx.fillStyle = 'white';
                    ctx.fillRect(this.x + 44, this.y + 3, 8, 8);
                    ctx.fillRect(this.x + 52, this.y + 3, 8, 8);
                    ctx.fillStyle = '#0a0a0a';
                    ctx.fillRect(this.x + 46, this.y + 5, 4, 4);
                    ctx.fillRect(this.x + 54, this.y + 5, 4, 4);
                } else {
                    ctx.fillStyle = '#0a0a0a';
                    ctx.fillRect(this.x + 44, this.y + 5, 8, 4);
                    ctx.fillRect(this.x + 52, this.y + 5, 8, 4);
                }
                
                // Tag do jogador
                ctx.fillStyle = 'white';
                ctx.font = 'bold 14px "Segoe UI"';
                ctx.fillText(`P${this.posicao}`, this.x + 12, this.y - 5);
                
                ctx.restore();
            }
            
            getRect() {
                return {
                    x: this.x + 8,
                    y: this.y + 5,
                    w: this.largura - 8,
                    h: this.altura - 5
                };
            }
            
            morrer() {
                this.vivo = false;
            }
        }

        // ====================================
        // OBSTÁCULO
        // ====================================

        class Obstaculo {
            constructor(tipo, faseAtual) {
                this.tipo = tipo;
                this.x = LARGURA;
                this.velocidade = obstaculosPorFase[faseAtual].velocidade;
                
                switch(tipo) {
                    case 'cacto': this.y = ALTURA - 78; this.largura = 22; this.altura = 48; break;
                    case 'passaro': this.y = ALTURA - 120; this.largura = 30; this.altura = 25; break;
                    case 'pedra': this.y = ALTURA - 70; this.largura = 25; this.altura = 40; break;
                    case 'tocha': this.y = ALTURA - 80; this.largura = 15; this.altura = 50; break;
                    case 'fogueira': this.y = ALTURA - 75; this.largura = 28; this.altura = 45; break;
                    case 'poca': this.y = ALTURA - 60; this.largura = 35; this.altura = 30; break;
                    case 'muro': this.y = ALTURA - 90; this.largura = 20; this.altura = 60; break;
                    case 'engrenagem': this.y = ALTURA - 75; this.largura = 22; this.altura = 45; break;
                    case 'cristal': this.y = ALTURA - 85; this.largura = 18; this.altura = 55; break;
                    case 'trepadeira': this.y = ALTURA - 70; this.largura = 25; this.altura = 40; break;
                    case 'buraco': this.y = ALTURA - 55; this.largura = 40; this.altura = 25; break;
                    case 'estatua': this.y = ALTURA - 85; this.largura = 25; this.altura = 55; break;
                    case 'raio': this.y = ALTURA - 90; this.largura = 15; this.altura = 60; break;
                    case 'gelo': this.y = ALTURA - 70; this.largura = 28; this.altura = 40; break;
                    case 'cogumelo': this.y = ALTURA - 75; this.largura = 22; this.altura = 45; break;
                    case 'escorpiao': this.y = ALTURA - 70; this.largura = 25; this.altura = 40; break;
                    case 'bomba': this.y = ALTURA - 75; this.largura = 20; this.altura = 45; break;
                    case 'fantasma': this.y = ALTURA - 100; this.largura = 28; this.altura = 35; break;
                    case 'dragao': this.y = ALTURA - 110; this.largura = 40; this.altura = 50; break;
                    case 'chefe': this.y = ALTURA - 120; this.largura = 50; this.altura = 60; break;
                    default: this.y = ALTURA - 78; this.largura = 22; this.altura = 48;
                }
            }
            
            atualizar() { this.x -= this.velocidade; }
            
            desenhar() {
                ctx.fillStyle = '#2d6a4f';
                ctx.fillRect(this.x, this.y, this.largura, this.altura);
                if(this.tipo === 'passaro') {
                    ctx.fillStyle = '#FF8C00';
                    ctx.beginPath();
                    ctx.moveTo(this.x + this.largura, this.y + this.altura/2);
                    ctx.lineTo(this.x + this.largura + 10, this.y + this.altura/2 - 5);
                    ctx.lineTo(this.x + this.largura + 10, this.y + this.altura/2 + 5);
                    ctx.fill();
                }
            }
            
            getRect() { return { x: this.x + 3, y: this.y, w: this.largura - 3, h: this.altura }; }
            foraTela() { return this.x + this.largura < 0; }
        }

        // ====================================
        // CHÃO
        // ====================================

        class Chao {
            constructor() {
                this.x1 = 0; this.x2 = LARGURA; this.y = ALTURA - 45;
                this.velocidade = velocidadeJogo;
            }
            
            atualizar() {
                this.velocidade = velocidadeJogo;
                this.x1 -= this.velocidade;
                this.x2 -= this.velocidade;
                if (this.x1 + LARGURA < 0) this.x1 = this.x2 + LARGURA;
                if (this.x2 + LARGURA < 0) this.x2 = this.x1 + LARGURA;
            }
            
            desenhar() {
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(0, this.y + 5, LARGURA, 15);
                const gradChao = ctx.createLinearGradient(0, this.y, 0, this.y + 15);
                gradChao.addColorStop(0, '#8B7355');
                gradChao.addColorStop(1, '#6d4c2e');
                ctx.fillStyle = gradChao;
                ctx.fillRect(0, this.y, LARGURA, 15);
                ctx.fillStyle = '#5a3e1b';
                ctx.fillRect(0, this.y - 5, LARGURA, 5);
            }
        }

        // ====================================
        // NUVEM
        // ====================================

        class Nuvem {
            constructor() {
                this.x = Math.random() * (LARGURA + 500) + LARGURA;
                this.y = Math.random() * (130 - 40) + 40;
                this.velocidade = Math.random() * 1.5 + 0.5;
                this.opacidade = Math.random() * 0.3 + 0.5;
            }
            
            atualizar() {
                this.x -= this.velocidade;
                if (this.x + 80 < 0) {
                    this.x = LARGURA + Math.random() * 400;
                    this.y = Math.random() * (130 - 40) + 40;
                }
            }
            
            desenhar() {
                ctx.save();
                ctx.globalAlpha = this.opacidade;
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacidade})`;
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, 35, 25, 0, 0, Math.PI * 2);
                ctx.ellipse(this.x + 30, this.y - 10, 28, 22, 0, 0, Math.PI * 2);
                ctx.ellipse(this.x - 20, this.y - 8, 25, 20, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ====================================
        // FUNÇÕES AUXILIARES
        // ====================================

        function colisao(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                    rect1.x + rect1.w > rect2.x &&
                    rect1.y < rect2.y + rect2.h &&
                    rect1.y + rect1.h > rect2.y;
        }

        function verificarMudancaFase() {
            let novaFase = Math.floor(pontuacao / 10) + 1;
            if (novaFase > 20) novaFase = 20;
            if (novaFase !== fase && novaFase <= 20) {
                fase = novaFase;
                atualizarInterfaceFase();
            }
        }

        function verificarVencedor() {
            if (modoMultiplayer) {
                if (!dino1.vivo && !dino2.vivo) {
                    jogoRodando = false;
                    vencedor = null;
                    winnerDisplay.innerHTML = "💀 EMPATE! 💀";
                } else if (!dino1.vivo) {
                    jogoRodando = false;
                    vencedor = 2;
                    winnerDisplay.innerHTML = "🏆 JOGADOR 2 VENCEU! 🏆";
                } else if (!dino2.vivo) {
                    jogoRodando = false;
                    vencedor = 1;
                    winnerDisplay.innerHTML = "🏆 JOGADOR 1 VENCEU! 🏆";
                }
            }
        }

        function desenharGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 0, LARGURA, ALTURA);
            
            ctx.font = 'bold 42px "Segoe UI"';
            ctx.fillStyle = '#FF6B6B';
            ctx.textAlign = 'center';
            
            if (modoMultiplayer && vencedor) {
                ctx.fillText(`🏆 JOGADOR ${vencedor} VENCEU! 🏆`, LARGURA / 2, ALTURA / 2 - 60);
            } else {
                ctx.fillText('💀 GAME OVER 💀', LARGURA / 2, ALTURA / 2 - 60);
            }
            
            ctx.font = '28px "Segoe UI"';
            ctx.fillStyle = '#FFD700';
            
            if (modoMultiplayer) {
                ctx.fillText(`JOGADOR 1: ${pontuacao} pontos`, LARGURA / 2, ALTURA / 2 + 20);
                ctx.fillText(`JOGADOR 2: ${pontuacao2} pontos`, LARGURA / 2, ALTURA / 2 + 70);
            } else {
                ctx.fillText(`🏆 PONTUAÇÃO: ${pontuacao}`, LARGURA / 2, ALTURA / 2);
                ctx.fillText(`⭐ FASE ATINGIDA: ${fase}/20`, LARGURA / 2, ALTURA / 2 + 50);
            }
            
            ctx.font = '18px "Segoe UI"';
            ctx.fillStyle = '#aaa';
            ctx.fillText('Pressione ESPAÇO ou clique em REINICIAR', LARGURA / 2, ALTURA / 2 + 140);
        }

        function desenharCeu() {
            const gradCeu = ctx.createLinearGradient(0, 0, 0, ALTURA);
            gradCeu.addColorStop(0, '#87CEEB');
            gradCeu.addColorStop(0.6, '#E0F6FF');
            gradCeu.addColorStop(1, '#FFE4B5');
            ctx.fillStyle = gradCeu;
            ctx.fillRect(0, 0, LARGURA, ALTURA);
        }

        // ====================================
        // INICIALIZAÇÃO
        // ====================================

        let dino1, dino2, obstaculos, nuvens, chao;
        let frameCounter = 0;

        function init() {
            dino1 = new Dino(100, '#FF6B6B', '#FF8E53', 1);
            if (modoMultiplayer) {
                dino2 = new Dino(180, '#4ECDC4', '#6EE7E0', 2);
            }
            obstaculos = [];
            nuvens = [new Nuvem(), new Nuvem(), new Nuvem()];
            chao = new Chao();
            pontuacao = 0;
            pontuacao2 = 0;
            fase = 1;
            frameCounter = 0;
            jogoRodando = true;
            vencedor = null;
            winnerDisplay.innerHTML = "";
            atualizarInterfaceFase();
            scoreElement.textContent = pontuacao;
            score1Element.textContent = pontuacao;
            score2Element.textContent = pontuacao2;
            
            if (!modoMultiplayer && player2Card.style.display !== 'none') {
                player2Card.style.display = 'none';
            } else if (modoMultiplayer) {
                player2Card.style.display = 'block';
            }
        }

        // ====================================
        // LOOP DO JOGO
        // ====================================

        function atualizarJogo() {
            if (!jogoRodando) {
                desenharGameOver();
                return;
            }
            
            dino1.atualizar();
            if (modoMultiplayer && dino2) dino2.atualizar();
            chao.atualizar();
            
            for (let nuvem of nuvens) {
                nuvem.atualizar();
            }
            
            let spawnRate = Math.max(50, 100 - (fase * 2));
            frameCounter++;
            if (frameCounter > spawnRate) {
                const tipoAtual = obstaculosPorFase[fase].tipo;
                obstaculos.push(new Obstaculo(tipoAtual, fase));
                frameCounter = 0;
            }
            
            for (let i = 0; i < obstaculos.length; i++) {
                obstaculos[i].atualizar();
                
                if (obstaculos[i].foraTela()) {
                    obstaculos.splice(i, 1);
                    if (dino1.vivo) {
                        pontuacao++;
                        scoreElement.textContent = pontuacao;
                        score1Element.textContent = pontuacao;
                    }
                    if (modoMultiplayer && dino2 && dino2.vivo) {
                        pontuacao2++;
                        score2Element.textContent = pontuacao2;
                    }
                    verificarMudancaFase();
                    
                    let totalScore = modoMultiplayer ? Math.max(pontuacao, pontuacao2) : pontuacao;
                    if (totalScore > recorde) {
                        recorde = totalScore;
                        recordElement.textContent = recorde;
                        localStorage.setItem('dinoRecordeMultiplayer', recorde);
                    }
                    i--;
                }
            }
            
            // Colisões
            for (let obstaculo of obstaculos) {
                if (dino1.vivo && colisao(dino1.getRect(), obstaculo.getRect())) {
                    dino1.morrer();
                }
                if (modoMultiplayer && dino2 && dino2.vivo && colisao(dino2.getRect(), obstaculo.getRect())) {
                    dino2.morrer();
                }
            }
            
            verificarVencedor();
            desenhar();
        }

        function desenhar() {
            desenharCeu();
            
            const gradSol = ctx.createRadialGradient(70, 70, 0, 70, 70, 40);
            gradSol.addColorStop(0, '#FFF176');
            gradSol.addColorStop(0.5, '#FFD700');
            gradSol.addColorStop(1, '#FFA000');
            ctx.fillStyle = gradSol;
            ctx.beginPath();
            ctx.arc(70, 70, 35, 0, Math.PI * 2);
            ctx.fill();
            
            for(let i = 0; i < 12; i++) {
                let angle = i * Math.PI * 2 / 12 + Date.now() * 0.002;
                let x1 = 70 + Math.cos(angle) * 40;
                let y1 = 70 + Math.sin(angle) * 40;
                let x2 = 70 + Math.cos(angle) * 60;
                let y2 = 70 + Math.sin(angle) * 60;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#FFD700';
                ctx.stroke();
            }
            
            for (let nuvem of nuvens) {
                nuvem.desenhar();
            }
            
            for (let obstaculo of obstaculos) {
                obstaculo.desenhar();
            }
            
            dino1.desenhar();
            if (modoMultiplayer && dino2) dino2.desenhar();
            chao.desenhar();
        }

        // ====================================
        // CONTROLES
        // ====================================

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'Space') {
                e.preventDefault();
                if (!jogoRodando) {
                    init();
                } else {
                    dino1.pular();
                }
            }
        });

        canvas.addEventListener('click', () => {
            if (modoMultiplayer) {
                if (!jogoRodando) {
                    init();
                } else if (dino2 && dino2.vivo) {
                    dino2.pular();
                }
            } else {
                if (!jogoRodando) {
                    init();
                } else {
                    dino1.pular();
                }
            }
        });

        reiniciarBtn.addEventListener('click', () => {
            init();
        });

        // Modo seletor
        document.querySelectorAll('.modo-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.modo-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                modoMultiplayer = btn.dataset.modo === 'multi';
                
                if (modoMultiplayer) {
                    instrucaoJogo.innerHTML = '👥 JOGADOR 1: ⬆️ ESPAÇO | JOGADOR 2: 🖱️ CLIQUE na tela';
                    player2Card.style.display = 'block';
                } else {
                    instrucaoJogo.innerHTML = '⬆️ ESPAÇO para pular';
                    player2Card.style.display = 'none';
                }
                init();
            });
        });

        window.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space' || e.key === 'ArrowUp') {
                e.preventDefault();
            }
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        // ====================================
        // INICIAR
        // ====================================

        init();

        function gameLoop() {
            atualizarJogo();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
