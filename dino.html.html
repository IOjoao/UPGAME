<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🦖 DINO GAME - 20 FASES! 🌟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            letter-spacing: 3px;
        }

        .fase-info {
            font-size: 1rem;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .fase-badge {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            padding: 5px 20px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
        }

        .proximo-obstaculo {
            background: rgba(0,0,0,0.5);
            padding: 5px 20px;
            border-radius: 25px;
            color: #FFD700;
            font-weight: bold;
        }

        .instrucao {
            color: #ccc;
            margin-bottom: 15px;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
        }

        canvas {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }

        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 20px 0 20px;
            padding: 10px 25px;
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }

        .score, .record, .fase-atual {
            font-size: 1.1rem;
            color: #FFD700;
        }

        .score span, .record span, .fase-atual span {
            color: #FF6B6B;
            font-size: 1.5rem;
            font-weight: bold;
            margin-left: 10px;
            background: rgba(0,0,0,0.5);
            padding: 3px 12px;
            border-radius: 20px;
        }

        button {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            font-family: inherit;
            color: white;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF6B6B, #FFD700);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        @media (max-width: 900px) {
            canvas {
                width: 95vw;
                height: auto;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .info {
                flex-direction: column;
                gap: 10px;
            }
            
            .fase-info {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦖 DINO GAME - 20 FASES! 🌟</h1>
        <div class="fase-info">
            <div class="fase-badge" id="faseNome">🌵 FASE 1: CACTOS</div>
            <div class="proximo-obstaculo" id="proximoObstaculo">⏩ PRÓXIMO: 🐦 PÁSSAROS</div>
        </div>
        <p class="instrucao">⬆️ ESPAÇO ou CLIQUE para pular</p>
        
        <canvas id="gameCanvas" width="900" height="450"></canvas>
        
        <div class="info">
            <div class="score">🏆 PONTOS <span id="score">0</span></div>
            <div class="fase-atual">⭐ FASE <span id="faseNumero">1</span>/20</div>
            <div class="record">🏅 RECORDE <span id="record">0</span></div>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 5%"></div>
        </div>
        
        <button id="reiniciarBtn">🔄 REINICIAR JOGO</button>
    </div>

    <script>
        // ====================================
        // CONFIGURAÇÕES
        // ====================================

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const recordElement = document.getElementById('record');
        const faseNumeroElement = document.getElementById('faseNumero');
        const faseNomeElement = document.getElementById('faseNome');
        const proximoObstaculoElement = document.getElementById('proximoObstaculo');
        const progressFill = document.getElementById('progressFill');
        const reiniciarBtn = document.getElementById('reiniciarBtn');

        const LARGURA = 900;
        const ALTURA = 450;
        canvas.width = LARGURA;
        canvas.height = ALTURA;

        let jogoRodando = true;
        let pontuacao = 0;
        let fase = 1;
        let recorde = localStorage.getItem('dinoRecorde20Fases') || 0;
        recordElement.textContent = recorde;

        let velocidadeJogo = 5;
        
        // ====================================
        // DEFINIÇÃO DOS OBSTÁCULOS POR FASE
        // ====================================
        
        const obstaculosPorFase = {
            1: { nome: "🌵 CACTOS", cor: "#2d6a4f", proximo: "🐦 PÁSSAROS", tipo: "cacto", velocidade: 5 },
            2: { nome: "🐦 PÁSSAROS", cor: "#8B4513", proximo: "🪨 PEDRAS", tipo: "passaro", velocidade: 5.5 },
            3: { nome: "🪨 PEDRAS", cor: "#696969", proximo: "🔥 TOCHAS", tipo: "pedra", velocidade: 6 },
            4: { nome: "🔥 TOCHAS", cor: "#FF4500", proximo: "💀 FOGUEIRAS", tipo: "tocha", velocidade: 6.5 },
            5: { nome: "💀 FOGUEIRAS", cor: "#DC143C", proximo: "🌊 POÇAS", tipo: "fogueira", velocidade: 7 },
            6: { nome: "🌊 POÇAS D'ÁGUA", cor: "#4169E1", proximo: "🧱 MUROS", tipo: "poca", velocidade: 7.2 },
            7: { nome: "🧱 MUROS", cor: "#8B4513", proximo: "⚙️ ENGRENAGENS", tipo: "muro", velocidade: 7.5 },
            8: { nome: "⚙️ ENGRENAGENS", cor: "#C0C0C0", proximo: "🔮 CRISTAIS", tipo: "engrenagem", velocidade: 7.8 },
            9: { nome: "🔮 CRISTAIS", cor: "#9370DB", proximo: "🌿 TREPADEIRAS", tipo: "cristal", velocidade: 8 },
            10: { nome: "🌿 TREPADEIRAS", cor: "#228B22", proximo: "🕳️ BURACOS", tipo: "trepadeira", velocidade: 8.2 },
            11: { nome: "🕳️ BURACOS", cor: "#4a2e0b", proximo: "🗿 ESTÁTUAS", tipo: "buraco", velocidade: 8.5 },
            12: { nome: "🗿 ESTÁTUAS", cor: "#A0522D", proximo: "⚡ RAIOS", tipo: "estatua", velocidade: 8.7 },
            13: { nome: "⚡ RAIOS", cor: "#FFD700", proximo: "❄️ GELO", tipo: "raio", velocidade: 9 },
            14: { nome: "❄️ GELO", cor: "#87CEEB", proximo: "🍄 COGUMELOS", tipo: "gelo", velocidade: 9.2 },
            15: { nome: "🍄 COGUMELOS", cor: "#FF69B4", proximo: "🦂 ESCORPIÕES", tipo: "cogumelo", velocidade: 9.5 },
            16: { nome: "🦂 ESCORPIÕES", cor: "#8B0000", proximo: "🧨 BOMBAS", tipo: "escorpiao", velocidade: 9.7 },
            17: { nome: "🧨 BOMBAS", cor: "#000000", proximo: "👻 FANTASMAS", tipo: "bomba", velocidade: 10 },
            18: { nome: "👻 FANTASMAS", cor: "#DDA0DD", proximo: "🐉 DRAGÃO", tipo: "fantasma", velocidade: 10.2 },
            19: { nome: "🐉 DRAGÃO", cor: "#FF4500", proximo: "👑 CHEFE FINAL", tipo: "dragao", velocidade: 10.5 },
            20: { nome: "👑 CHEFE FINAL", cor: "#FFD700", proximo: "🏆 VITÓRIA!", tipo: "chefe", velocidade: 11 }
        };

        function atualizarInterfaceFase() {
            faseNumeroElement.textContent = fase;
            faseNomeElement.textContent = `${obstaculosPorFase[fase].nome}`;
            if (fase < 20) {
                proximoObstaculoElement.innerHTML = `⏩ PRÓXIMO: ${obstaculosPorFase[fase+1].nome}`;
            } else {
                proximoObstaculoElement.innerHTML = `🏆 FASE FINAL!`;
            }
            const progresso = (fase / 20) * 100;
            progressFill.style.width = `${progresso}%`;
            velocidadeJogo = obstaculosPorFase[fase].velocidade;
        }

        // ====================================
        // CLASSE DO DINOSSAURO
        // ====================================

        class Dino {
            constructor() {
                this.x = 100;
                this.y = ALTURA - 85;
                this.largura = 35;
                this.altura = 45;
                this.velY = 0;
                this.pulando = false;
                this.gravidade = 0.8;
                this.forcaPulo = -12;
                this.animacaoPerna = 0;
                this.olhosAbertos = true;
                this.cor = "#2d6a4f";
            }
            
            pular() {
                if (!this.pulando && jogoRodando) {
                    this.velY = this.forcaPulo;
                    this.pulando = true;
                }
            }
            
            atualizar() {
                if (this.pulando) {
                    this.velY += this.gravidade;
                    this.y += this.velY;
                    
                    if (this.y >= ALTURA - 85) {
                        this.y = ALTURA - 85;
                        this.pulando = false;
                        this.velY = 0;
                    }
                }
                
                if (!this.pulando && jogoRodando) {
                    this.animacaoPerna = (this.animacaoPerna + 0.2) % (Math.PI * 2);
                }
                
                if (Math.random() < 0.005) {
                    this.olhosAbertos = false;
                    setTimeout(() => { if(this.olhosAbertos !== undefined) this.olhosAbertos = true; }, 100);
                }
            }
            
            desenhar() {
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 5;
                
                const corpoGrad = ctx.createLinearGradient(this.x, this.y, this.x + this.largura, this.y + this.altura);
                corpoGrad.addColorStop(0, '#2d6a4f');
                corpoGrad.addColorStop(1, '#1b4332');
                ctx.fillStyle = corpoGrad;
                ctx.fillRect(this.x, this.y, this.largura, this.altura);
                
                ctx.fillStyle = '#40916c';
                ctx.fillRect(this.x + 6, this.y + 15, 12, 22);
                
                const anguloPerna = Math.sin(this.animacaoPerna) * 0.5;
                ctx.fillStyle = '#1b4332';
                
                ctx.save();
                ctx.translate(this.x + 8, this.y + 40);
                ctx.rotate(anguloPerna);
                ctx.fillRect(0, 0, 10, 12);
                ctx.restore();
                
                ctx.save();
                ctx.translate(this.x + 22, this.y + 40);
                ctx.rotate(-anguloPerna);
                ctx.fillRect(0, 0, 10, 12);
                ctx.restore();
                
                ctx.fillStyle = '#2d6a4f';
                ctx.fillRect(this.x + 28, this.y + 10, 12, 22);
                ctx.fillRect(this.x + 35, this.y - 2, 24, 24);
                
                if (this.olhosAbertos) {
                    ctx.fillStyle = 'white';
                    ctx.fillRect(this.x + 44, this.y + 3, 8, 8);
                    ctx.fillRect(this.x + 52, this.y + 3, 8, 8);
                    ctx.fillStyle = '#0a0a0a';
                    ctx.fillRect(this.x + 46, this.y + 5, 4, 4);
                    ctx.fillRect(this.x + 54, this.y + 5, 4, 4);
                    ctx.fillStyle = 'white';
                    ctx.fillRect(this.x + 44, this.y + 4, 2, 2);
                    ctx.fillRect(this.x + 52, this.y + 4, 2, 2);
                } else {
                    ctx.fillStyle = '#0a0a0a';
                    ctx.fillRect(this.x + 44, this.y + 5, 8, 4);
                    ctx.fillRect(this.x + 52, this.y + 5, 8, 4);
                }
                
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(this.x + 50, this.y + 14, 3, 5);
                ctx.fillRect(this.x + 54, this.y + 14, 3, 5);
                
                for(let i = 0; i < 4; i++) {
                    ctx.fillStyle = '#1b4332';
                    ctx.fillRect(this.x - 10 + i*10, this.y - 8 + i*4, 6, 12);
                }
                
                ctx.restore();
            }
            
            getRect() {
                return {
                    x: this.x + 8,
                    y: this.y + 5,
                    w: this.largura - 8,
                    h: this.altura - 5
                };
            }
        }

        // ====================================
        // FÁBRICA DE OBSTÁCULOS
        // ====================================

        class Obstaculo {
            constructor(tipo, faseAtual) {
                this.tipo = tipo;
                this.x = LARGURA;
                this.fase = faseAtual;
                this.velocidade = obstaculosPorFase[faseAtual].velocidade;
                
                const config = obstaculosPorFase[faseAtual];
                this.cor = config.cor;
                
                switch(tipo) {
                    case 'cacto':
                        this.y = ALTURA - 78;
                        this.largura = 22;
                        this.altura = 48;
                        break;
                    case 'passaro':
                        this.y = ALTURA - 120;
                        this.largura = 30;
                        this.altura = 25;
                        break;
                    case 'pedra':
                        this.y = ALTURA - 70;
                        this.largura = 25;
                        this.altura = 40;
                        break;
                    case 'tocha':
                        this.y = ALTURA - 80;
                        this.largura = 15;
                        this.altura = 50;
                        break;
                    case 'fogueira':
                        this.y = ALTURA - 75;
                        this.largura = 28;
                        this.altura = 45;
                        break;
                    case 'poca':
                        this.y = ALTURA - 60;
                        this.largura = 35;
                        this.altura = 30;
                        break;
                    case 'muro':
                        this.y = ALTURA - 90;
                        this.largura = 20;
                        this.altura = 60;
                        break;
                    case 'engrenagem':
                        this.y = ALTURA - 75;
                        this.largura = 22;
                        this.altura = 45;
                        break;
                    case 'cristal':
                        this.y = ALTURA - 85;
                        this.largura = 18;
                        this.altura = 55;
                        break;
                    case 'trepadeira':
                        this.y = ALTURA - 70;
                        this.largura = 25;
                        this.altura = 40;
                        break;
                    case 'buraco':
                        this.y = ALTURA - 55;
                        this.largura = 40;
                        this.altura = 25;
                        break;
                    case 'estatua':
                        this.y = ALTURA - 85;
                        this.largura = 25;
                        this.altura = 55;
                        break;
                    case 'raio':
                        this.y = ALTURA - 90;
                        this.largura = 15;
                        this.altura = 60;
                        break;
                    case 'gelo':
                        this.y = ALTURA - 70;
                        this.largura = 28;
                        this.altura = 40;
                        break;
                    case 'cogumelo':
                        this.y = ALTURA - 75;
                        this.largura = 22;
                        this.altura = 45;
                        break;
                    case 'escorpiao':
                        this.y = ALTURA - 70;
                        this.largura = 25;
                        this.altura = 40;
                        break;
                    case 'bomba':
                        this.y = ALTURA - 75;
                        this.largura = 20;
                        this.altura = 45;
                        break;
                    case 'fantasma':
                        this.y = ALTURA - 100;
                        this.largura = 28;
                        this.altura = 35;
                        break;
                    case 'dragao':
                        this.y = ALTURA - 110;
                        this.largura = 40;
                        this.altura = 50;
                        break;
                    case 'chefe':
                        this.y = ALTURA - 120;
                        this.largura = 50;
                        this.altura = 60;
                        break;
                    default:
                        this.y = ALTURA - 78;
                        this.largura = 22;
                        this.altura = 48;
                }
            }
            
            atualizar() {
                this.x -= this.velocidade;
            }
            
            desenhar() {
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.2)';
                ctx.shadowBlur = 3;
                
                const grad = ctx.createLinearGradient(this.x, this.y, this.x + this.largura, this.y + this.altura);
                grad.addColorStop(0, this.cor);
                grad.addColorStop(1, this.cor);
                ctx.fillStyle = grad;
                ctx.fillRect(this.x, this.y, this.largura, this.altura);
                
                // Detalhes específicos por tipo
                if (this.tipo === 'passaro') {
                    ctx.fillStyle = '#FF8C00';
                    ctx.beginPath();
                    ctx.moveTo(this.x + this.largura, this.y + this.altura/2);
                    ctx.lineTo(this.x + this.largura + 10, this.y + this.altura/2 - 5);
                    ctx.lineTo(this.x + this.largura + 10, this.y + this.altura/2 + 5);
                    ctx.fill();
                } else if (this.tipo === 'tocha') {
                    ctx.fillStyle = '#FF4500';
                    ctx.beginPath();
                    ctx.arc(this.x + this.largura/2, this.y - 5, 6, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.tipo === 'chefe') {
                    ctx.fillStyle = '#FFD700';
                    ctx.font = 'bold 30px sans-serif';
                    ctx.fillText('👑', this.x + 5, this.y - 5);
                } else if (this.tipo === 'fantasma') {
                    ctx.fillStyle = '#DDA0DD';
                    ctx.font = '25px sans-serif';
                    ctx.fillText('👻', this.x + 3, this.y - 3);
                } else if (this.tipo === 'dragao') {
                    ctx.fillStyle = '#FF4500';
                    ctx.font = '30px sans-serif';
                    ctx.fillText('🐉', this.x + 5, this.y - 5);
                } else if (this.tipo === 'bomba') {
                    ctx.fillStyle = '#000';
                    ctx.font = '22px sans-serif';
                    ctx.fillText('💣', this.x + 3, this.y - 3);
                }
                
                ctx.restore();
            }
            
            getRect() {
                return {
                    x: this.x + 3,
                    y: this.y,
                    w: this.largura - 3,
                    h: this.altura
                };
            }
            
            foraTela() {
                return this.x + this.largura < 0;
            }
        }

        // ====================================
        // CHÃO
        // ====================================

        class Chao {
            constructor() {
                this.x1 = 0;
                this.x2 = LARGURA;
                this.y = ALTURA - 45;
                this.velocidade = velocidadeJogo;
            }
            
            atualizar() {
                this.velocidade = velocidadeJogo;
                this.x1 -= this.velocidade;
                this.x2 -= this.velocidade;
                
                if (this.x1 + LARGURA < 0) {
                    this.x1 = this.x2 + LARGURA;
                }
                if (this.x2 + LARGURA < 0) {
                    this.x2 = this.x1 + LARGURA;
                }
            }
            
            desenhar() {
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(0, this.y + 5, LARGURA, 15);
                
                const gradChao = ctx.createLinearGradient(0, this.y, 0, this.y + 15);
                gradChao.addColorStop(0, '#8B7355');
                gradChao.addColorStop(1, '#6d4c2e');
                ctx.fillStyle = gradChao;
                ctx.fillRect(0, this.y, LARGURA, 15);
                
                ctx.fillStyle = '#5a3e1b';
                ctx.fillRect(0, this.y - 5, LARGURA, 5);
                
                ctx.fillStyle = '#4a2e0b';
                for(let i = 0; i < 15; i++) {
                    ctx.fillRect((this.x1 + i * 60) % LARGURA, this.y - 3, 3, 3);
                    ctx.fillRect((this.x2 + i * 60) % LARGURA, this.y - 3, 3, 3);
                }
            }
        }

        // ====================================
        // NUVEM
        // ====================================

        class Nuvem {
            constructor() {
                this.x = Math.random() * (LARGURA + 500) + LARGURA;
                this.y = Math.random() * (130 - 40) + 40;
                this.velocidade = Math.random() * 1.5 + 0.5;
                this.opacidade = Math.random() * 0.3 + 0.5;
            }
            
            atualizar() {
                this.x -= this.velocidade;
                if (this.x + 80 < 0) {
                    this.x = LARGURA + Math.random() * 400;
                    this.y = Math.random() * (130 - 40) + 40;
                }
            }
            
            desenhar() {
                ctx.save();
                ctx.globalAlpha = this.opacidade;
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacidade})`;
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, 35, 25, 0, 0, Math.PI * 2);
                ctx.ellipse(this.x + 30, this.y - 10, 28, 22, 0, 0, Math.PI * 2);
                ctx.ellipse(this.x - 20, this.y - 8, 25, 20, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ====================================
        // FUNÇÕES AUXILIARES
        // ====================================

        function colisao(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                    rect1.x + rect1.w > rect2.x &&
                    rect1.y < rect2.y + rect2.h &&
                    rect1.y + rect1.h > rect2.y;
        }

        function verificarMudancaFase() {
            let novaFase = Math.floor(pontuacao / 10) + 1;
            if (novaFase > 20) novaFase = 20;
            if (novaFase !== fase && novaFase <= 20) {
                fase = novaFase;
                atualizarInterfaceFase();
                
                // Efeito visual de mudança de fase
                ctx.fillStyle = 'rgba(255,215,0,0.5)';
                ctx.fillRect(0, 0, LARGURA, ALTURA);
                
                // Mensagem de nova fase
                ctx.font = 'bold 30px "Segoe UI"';
                ctx.fillStyle = '#FFD700';
                ctx.textAlign = 'center';
                ctx.fillText(`⭐ FASE ${fase}! ⭐`, LARGURA/2, ALTURA/2);
                ctx.font = '20px "Segoe UI"';
                ctx.fillStyle = 'white';
                ctx.fillText(`${obstaculosPorFase[fase].nome}`, LARGURA/2, ALTURA/2 + 50);
            }
        }

        function desenharGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 0, LARGURA, ALTURA);
            
            ctx.font = 'bold 42px "Segoe UI"';
            ctx.fillStyle = '#FF6B6B';
            ctx.textAlign = 'center';
            ctx.fillText('💀 GAME OVER 💀', LARGURA / 2, ALTURA / 2 - 60);
            
            ctx.font = '28px "Segoe UI"';
            ctx.fillStyle = '#FFD700';
            ctx.fillText(`🏆 PONTUAÇÃO: ${pontuacao}`, LARGURA / 2, ALTURA / 2);
            ctx.fillText(`⭐ FASE ATINGIDA: ${fase}/20`, LARGURA / 2, ALTURA / 2 + 50);
            
            if (fase === 20) {
                ctx.fillStyle = '#4CAF50';
                ctx.font = '24px "Segoe UI"';
                ctx.fillText('🎉 PARABÉNS! VOCÊ ZEROU O JOGO! 🎉', LARGURA / 2, ALTURA / 2 + 110);
            }
            
            if (pontuacao === recorde && pontuacao > 0) {
                ctx.font = '20px "Segoe UI"';
                ctx.fillStyle = '#4CAF50';
                ctx.fillText('✨ NOVO RECORDE! ✨', LARGURA / 2, ALTURA / 2 + 160);
            }
            
            ctx.font = '18px "Segoe UI"';
            ctx.fillStyle = '#aaa';
            ctx.fillText('Pressione ESPAÇO ou clique em REINICIAR', LARGURA / 2, ALTURA / 2 + 210);
        }

        function desenharCeu() {
            const gradCeu = ctx.createLinearGradient(0, 0, 0, ALTURA);
            gradCeu.addColorStop(0, '#87CEEB');
            gradCeu.addColorStop(0.6, '#E0F6FF');
            gradCeu.addColorStop(1, '#FFE4B5');
            ctx.fillStyle = gradCeu;
            ctx.fillRect(0, 0, LARGURA, ALTURA);
        }

        // ====================================
        // INICIALIZAÇÃO
        // ====================================

        let dino, obstaculos, nuvens, chao;
        let frameCounter = 0;

        function init() {
            dino = new Dino();
            obstaculos = [];
            nuvens = [new Nuvem(), new Nuvem(), new Nuvem(), new Nuvem()];
            chao = new Chao();
            pontuacao = 0;
            fase = 1;
            frameCounter = 0;
            jogoRodando = true;
            atualizarInterfaceFase();
            scoreElement.textContent = pontuacao;
        }

        // ====================================
        // LOOP DO JOGO
        // ====================================

        function atualizarJogo() {
            if (!jogoRodando) {
                desenharGameOver();
                return;
            }
            
            dino.atualizar();
            chao.atualizar();
            
            for (let nuvem of nuvens) {
                nuvem.atualizar();
            }
            
            let spawnRate = Math.max(50, 100 - (fase * 2));
            frameCounter++;
            if (frameCounter > spawnRate) {
                const tipoAtual = obstaculosPorFase[fase].tipo;
                obstaculos.push(new Obstaculo(tipoAtual, fase));
                frameCounter = 0;
            }
            
            for (let i = 0; i < obstaculos.length; i++) {
                obstaculos[i].atualizar();
                
                if (obstaculos[i].foraTela()) {
                    obstaculos.splice(i, 1);
                    pontuacao++;
                    scoreElement.textContent = pontuacao;
                    verificarMudancaFase();
                    
                    if (pontuacao > recorde) {
                        recorde = pontuacao;
                        recordElement.textContent = recorde;
                        localStorage.setItem('dinoRecorde20Fases', recorde);
                    }
                    i--;
                }
            }
            
            for (let obstaculo of obstaculos) {
                if (colisao(dino.getRect(), obstaculo.getRect())) {
                    jogoRodando = false;
                }
            }
            
            desenhar();
        }

        function desenhar() {
            desenharCeu();
            
            const gradSol = ctx.createRadialGradient(70, 70, 0, 70, 70, 40);
            gradSol.addColorStop(0, '#FFF176');
            gradSol.addColorStop(0.5, '#FFD700');
            gradSol.addColorStop(1, '#FFA000');
            ctx.fillStyle = gradSol;
            ctx.beginPath();
            ctx.arc(70, 70, 35, 0, Math.PI * 2);
            ctx.fill();
            
            for(let i = 0; i < 12; i++) {
                let angle = i * Math.PI * 2 / 12 + Date.now() * 0.002;
                let x1 = 70 + Math.cos(angle) * 40;
                let y1 = 70 + Math.sin(angle) * 40;
                let x2 = 70 + Math.cos(angle) * 60;
                let y2 = 70 + Math.sin(angle) * 60;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#FFD700';
                ctx.stroke();
            }
            
            for (let nuvem of nuvens) {
                nuvem.desenhar();
            }
            
            for (let obstaculo of obstaculos) {
                obstaculo.desenhar();
            }
            
            dino.desenhar();
            chao.desenhar();
            
            ctx.font = 'bold 24px "Segoe UI"';
            ctx.fillStyle = '#333';
            ctx.textAlign = 'right';
            ctx.fillText(`${pontuacao}`, LARGURA - 30, 50);
        }

        // ====================================
        // CONTROLES
        // ====================================

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'Space') {
                e.preventDefault();
                if (!jogoRodando) {
                    init();
                } else {
                    dino.pular();
                }
            }
        });

        canvas.addEventListener('click', () => {
            if (!jogoRodando) {
                init();
            } else {
                dino.pular();
            }
        });

        reiniciarBtn.addEventListener('click', () => {
            init();
        });

        window.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space' || e.key === 'ArrowUp') {
                e.preventDefault();
            }
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        // ====================================
        // INICIAR
        // ====================================

        init();

        function gameLoop() {
            atualizarJogo();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
